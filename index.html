<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="public/sushi.png" />
    <link rel="stylesheet" href="css/style.css" />
    <title>Ninja Rolls</title>
  </head>
  <body>
    <header>
      <nav class="header__nav">
        <div class="header__logo">
          <h4>Ninja Rolls</h4>
          <div class="header__logo-overlay"></div>
        </div>
        <ul class="header__menu">
          <li>
            <a href="#menu">Menu</a>
          </li>
          <li>
            <a href="#food">Food</a>
          </li>
          <li>
            <a href="#services">Services</a>
          </li>
          <li>
            <a href="#about-us">About US</a>
          </li>
          <li>
            <img src="assets/search.svg" alt="search" />
          </li>
        </ul>

        <!-- for mobile devices -->
        <ul class="header__menu-mobile">
          <li>
            <img src="assets/menu.svg" alt="menu" />
          </li>
        </ul>
      </nav>
    </header>

    <!-- hero section -->
    <section class="hero">
      <div class="hero-image">
        <img src="assets/sushi-1.png" alt="sushi" />
        <h2>
          日<br />
          本 <br />
          食<br />
        </h2>
        <div class="hero-image__overlay"></div>
      </div>
      <!-- hero  content -->
      <div class="hero-content">
        <div class="hero-content-info">
          <h1>Fell the taste of Japanese food</h1>
          <p>
            Fell the taste of the most popular japanese food from anywhere and
            anytime.
          </p>

          <div class="hero-content__buttons">
            <button class="hero-content__order-button">Order Now</button>
            <button class="hero-content__play-button">
              <img src="assets/play-circle.svg" alt="" />
              How to Order
            </button>
          </div>
        </div>

        <!-- testimonial-->
        <div class="hero-content__testimonial">
          <div class="hero-content__customer">
            <h4>25<span>k+</span></h4>
            <p>Happy Customers</p>
          </div>
          <div class="hero-content__review">
            <img src="assets/user.png" alt="user" />
            <p>
              This is the best Japanese food delivery service that ever existed
            </p>
          </div>
        </div>
      </div>
    </section>

    <script src="js/script.js"></script>
  </body>
</html>
